<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Rakt Kosh - Donate Blood</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="project.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">e-Rakt Kosh</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Looking for Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Want to Donate</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-danger text-white" href="#">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section text-center">
        <div class="container">
            <h1>Give the Gift of Life</h1>
            <h2 class="text-danger">Donate Blood Today!</h2>
            <p>“Give the gift of life by donating blood. Your simple act can save a life and make a world of difference.”</p>
            <a href="#" class="btn btn-danger">Donate Now</a>
        </div>
    </header>

    <!-- Statistics Section -->
    <section class="stats text-center py-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="stat-box bg-primary text-white p-4">
                        <h3 id="donorsCount">7097432</h3>
                        <p>Donors Registered</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="stat-box bg-purple text-white p-4">
                        <h3 id="bloodUnits">7819280</h3>
                        <p>Blood Units Collected</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="project.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
